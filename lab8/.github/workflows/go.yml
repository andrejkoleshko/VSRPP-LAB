name: Go CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Install tools
        run: |
          go install github.com/golang/mock/mockgen@latest
          go get github.com/golang/mock/gomock
          go get github.com/alicebob/miniredis/v2

      - name: Run tests
        run: go test ./...
